[build]
  publish = "dist"
  command = "npm run build"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# 旧ドメイン(manapuraza.com)から新ドメインへの301リダイレクト
[[redirects]]
  from = "https://manapuraza.com/*"
  to = "https://www.yamashitamana.to/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.manapuraza.com/*"
  to = "https://www.yamashitamana.to/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://manapuraza.com/*"
  to = "https://www.yamashitamana.to/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.manapuraza.com/*"
  to = "https://www.yamashitamana.to/:splat"
  status = 301
  force = true

# SPA フォールバック（最後に配置）
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "22.22.0"
  # vite-ssg@28 が @unhead/vue@2 を要求する一方、@vueuse/head@2 は @unhead/vue@1 に依存しており
  # npm@10 の strict peer deps で install が失敗するため legacy peer deps モードを有効化
  NPM_FLAGS = "--legacy-peer-deps"
